{% extends "layout.html" %}
{% block title %}Change Password | LANGUARD{% endblock %}
{% block content %}
<div class="profile">
    <h1>Change Password</h1>
    <h2 class="hi-text">Please Enter Your Password</h2>
    
    <form method="POST">
        <div>
            <p class="title">Current Password</p>
            <input class="subtitle" type="password" name="current_password" placeholder="Enter your password" required >
        </div>

        <div>
            <p class="title">New Password</p>
            <input class="subtitle" type="password" name="new_password" placeholder="Enter new password" required >
        </div>

        <div>
            <p class="title">New Name</p>
            <input class="subtitle" type="password" name="confirm_password" placeholder="Re-enter new password" required >
        </div>

        <div class="profile-actions">
            <button type="button" class="back-btn" onclick="window.history.back()">
              Cancel
            </button>
    
            <button type="submit" class="edit-btn">
              Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
