{% extends "layout.html" %}
{% block title %}Profile | LANGUARD{% endblock %}
{% block content %}

<div class="profile">
  <h1>Profile</h1>  
  <h2 class="hi-text">Heyy, {{ user.name }}!</h2>
  <div>
    <p class="title">ID</p>
    <p class="subtitle">{{ user.user_id }}</p>
  </div>
  <div>
    <p class="title">Email/Username</p>
    <p class="subtitle">{{ user.email }}</p>
  </div>
  <div>
    <p class="title">Name</p>
    <p class="subtitle">{{ user.name }}</p>
  </div>
  <div>
    <p class="title">Role</p>
    <p class="subtitle">{{ user.role }}</p>
  </div>

  <div class="profile-actions">
    <button class="back-btn" onclick="window.history.back()"> Back</button>
    <div class="right-actions">
      <a href="{{ url_for('user_bp.edit_profile') }}" class="edit-btn">
        Edit Profile
      </a>
      <a href="{{ url_for('user_bp.change_password') }}" class="change-pw-btn">
        Change Password
      </a>
    </div>
  </div>

</div>
{% endblock %}
