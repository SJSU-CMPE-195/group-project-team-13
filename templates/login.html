{% extends "layout.html" %}
{% block title %}Login | LANGUARD{% endblock %}
{% block content %}
<div class="login-container" style="text-align:center; margin:auto; max-width: 500px;">
  <h2>Login to Your Account</h2>
  <form method="post" action="{{ url_for('user_bp.login') }}" style="display:flex; flex-direction:column; gap:15px; text-align:left;">
    <div>
      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" placeholder="Enter your email" required style="width:100%; padding:8px;" />
    </div>
    <div>
      <label for="password">Password:</label><br>
      <input type="password" id="password" name="password" placeholder="Enter your password" required style="width:100%; padding:8px;" />
    </div> 
    <button type="submit" style="padding:10px; margin-top:10px;">Log In</button>
  </form>
  <p class="register-link" style="margin-top:15px; text-align:center;">
    Don't have an account? 
    <a href="{{ url_for('user_bp.register') }}">Register here</a>
  </p>
</div>
{% endblock %}
