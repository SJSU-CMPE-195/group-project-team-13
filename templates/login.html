{% extends "layout.html" %}
{% block title %}Login | LANGUARD{% endblock %}
{% block content %}
<div class="login-container">
  <div class="login-card">
    <h2>Secure Access Portal</h2>
    <p class="login-subtitle">Authenticate to access LANGUARD system</p>
    <form method="post" action="{{ url_for('user_bp.login') }}" class="login-form">
      <div class="input">
        <label for="email">Email</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>
      <div class="input">
        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div> 
      <button type="submit" class="login-btn">Log In</button>
    </form>
    <p class="register-link">
      Don't have an account? 
      <a href="{{ url_for('user_bp.register') }}">Create an account</a>
    </p>
  </div>
</div>
{% endblock %}
