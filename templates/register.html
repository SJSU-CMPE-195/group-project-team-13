{% extends "layout.html" %}
{% block title %}Register | LANGUARD{% endblock %}
{% block content %}
<div class="login-container">
  <div class="login-card">
    <h2>Create a New Account</h2>
    <p class="login-subtitle">Join LANGUARD to protect your system</p>
    <form method="post" action="{{ url_for('user_bp.register') }}" class="login-form">
    
      <div class="input">
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>
      <div class="input">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your name" required />
      </div>
      <div class="input">
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>
      <div class="input">
        <label for="confirm_password">Confirm Password:</label><br>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required />
      </div>
      <button type="submit" class="login-btn">Register</button>
    </form>

    <p class="register-link">
      Already have an account? 
      <a href="{{ url_for('user_bp.login') }}">Login here</a>
    </p>
  </div>
</div>
{% endblock %}
